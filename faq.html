<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Löydä vastaukset yleisimpiin puhelimen korjaukseen liittyviin kysymyksiin. FixIT Mobile FAQ auttaa ratkaisemaan ongelmat nopeasti ja selkeästi."
    />
    <link rel="icon" type="image/x-icon" href="./Img/icons/favicon.ico" />
    <link rel="stylesheet" href="CSS/layoutdefinitions.css" />
    <link rel="stylesheet" href="CSS/layoutfaq.css" />
    <link rel="stylesheet" href="CSS/styleguide.css" />
    <link rel="stylesheet" href="CSS/styles.css" />
    <title>FixIT Mobile</title>
  </head>
  <body>
    <div class="page">
      <aside class="top-ad">
        <div class="top-ad-container flex-center">
          <img
            class="img-top-ad"
            src="Img/large/top-scrolling-ad.webp"
            alt="Ylämainos"
          />
        </div>
      </aside>

      <header>
        <nav>
          <div class="header-logo-container">
            <a href="./index.html">
              <img
                class="header-logo-img"
                src="./Img/logos/main-logo-large.webp"
                alt="FixIT Mobile logo"
              />
            </a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="./Img/icons/home_icon_white.png"
                alt="Etusivu"
              />
            </div>
            <a href="./index.html">Etusivu</a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="./Img/icons/repair_icon_white.png"
                alt="Korjaukset"
              />
            </div>
            <a href="./repairs.html">Korjaukset</a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="./Img/icons/faq_icon_white.png"
                alt="UKK"
              />
            </div>
            <a href="./faq.html">UKK</a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="./Img/icons/contact_icon_white.png"
                alt="Yhteystiedot"
              />
            </div>
            <a href="./contact.html">Yhteystiedot</a>
          </div>
        </nav>
      </header>

      <main class="flex-center column">
        <section class="flex-center column">
          <h1>Usein kysytyt kysymykset</h1>
          <p>
            Löydä vastaukset yleisimpiin puhelinten korjauksiin liittyviin
            kysymyksiin.
          </p>
        </section>

        <section class="faq-cards" id="faq-cards"></section>
      </main>

      <footer id="footer"></footer>
    </div>

    <script src="JS/data/phonerepairpricedata.js"></script>
    <script src="JS/scripts/main.js"></script>
    <script src="JS/data/faqdata.js"></script>
    <script src="JS/scripts/faq.js"></script>
  </body>
</html>
