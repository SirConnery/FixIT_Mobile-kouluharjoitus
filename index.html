      </aside>

      <header>
        <nav>

            <a href="/index.html">
              <img class="header-logo-img" src="Img/logos/mainlogo-large.png" />

          <div class="header-item flex-center">

            <div class="header-item-icon">
              <img
                class="header-item-icon-img"

              />
            </div>
            <a href="/contact.html">Contact</a>
          </div>
        </nav>

      <figure class="hero">
        <img
          class="hero-img"
          src="https://placehold.co/1500x300"

        />

      <main>
        <section class="site-summary-card">

        <div class="repair-finder">
