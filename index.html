<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/styles.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="page">
      <aside class="top-ad">
        <img
          class="img-top-ad"
          src="https://placehold.co/1080x20"
          alt="img-top-ad"
        />
      </aside>

      <header class="header">
        <nav>
          <img class="nav-bar-logo" />
          <button>Link 1</button>
          <button>Link 2</button>
          <button>Link 3</button>
          <button>Link 4</button>
        </nav>
      </header>

      <div class="middle-large-ad">
        <img
          class="middle-large-ad-img"
          src="https://placehold.co/600x300"
          alt="middle-large-ad-img"
        />
      </div>

      <aside class="decor-right-large">
        <img
          class="decor-right-large-img"
          src="https://placehold.co/200x400"
          alt="decorative image"
        />
      </aside>

      <main>Lorem ipsum</main>

      <div class="order-buttons">
        <button class="order-btn-brand">Select Brand</button>
        <button class="order-btn-model">Select Model</button>
        <button class="order-btn-view-prices">View Prices</button>
      </div>

      <aside class="review-right">
        <img
          class="review-right-img"
          src="https://placehold.co/200x100"
          alt="review-right-img"
        />
      </aside>
    </div>
  </body>
</html>
