  <body>
    <div class="page">
      <aside class="top-ad">
        <div class="top-ad-container">
          <img
            class="img-top-ad"
            src="https://placehold.co/1100x20"

          />

      <header>
        <nav>
          <a href="#link1">Link 1</a>
          <a href="#link2">Link 2</a>
