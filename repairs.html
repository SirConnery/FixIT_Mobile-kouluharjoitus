<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/layoutdefinitions.css" />
    <link rel="stylesheet" href="CSS/layoutrepairs.css" />
    <link rel="stylesheet" href="CSS/styleguide.css" />
    <link rel="stylesheet" href="CSS/styles.css" />
    <title>FixIT Mobile</title>
  </head>
  <body>
    <div class="page">
      <aside class="top-ad">
        <div class="top-ad-container flex-center">
          <img
            class="img-top-ad"
            src="Img/large/top-scrolling-ad.webp"
            alt="img-top-ad"
          />
        </div>
      </aside>

      <header>
        <nav>
          <div class="header-logo-container">
            <a href="index.html">
              <img class="header-logo-img" src="Img/logos/mainlogo-large.png" />
            </a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="Img/icons/home_icon_white.png"
              />
            </div>
            <a href="index.html">Home</a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="Img/icons/repair_icon_white.png"
              />
            </div>
            <a href="repairs.html">Repairs</a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="Img/icons/faq_icon_white.png"
              />
            </div>
            <a href="faq.html">FAQ</a>
          </div>

          <div class="header-item flex-center">
            <div class="header-item-icon">
              <img
                class="header-item-icon-img"
                src="Img/icons/contact_icon_white.png"
              />
            </div>
            <a href="contact.html">Contact</a>
          </div>
        </nav>
      </header>

      <figure class="hero">
        <img
          class="hero-img"
          src="Img/large/hero-img.webp"
          alt="decorative image"
        />
      </figure>

      <div class="repair-finder">
        <section class="brand-model-selection-card"></section>
      </div>

      <section class="showing-results-text">Showing results of 1-10</section>

      <section class="result-cards" id="result-cards"></section>

      <main>
        <section class="repairs-page-howitworks-card flex-center column">
          <h2>How it works</h2>
          <p>Lorem ipsum</p>
        </section>
      </main>

      <footer id="footer"></footer>
    </div>

    <script src="JS/data/phonerepairpricedata.js"></script>
    <script src="JS/scripts/main.js"></script>
    <script src="JS/scripts/repairs.js"></script>
  </body>
</html>
